<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — TradeConnect</title>
<link rel="stylesheet" href="../css/register.css">
</head>
<body>

<div id="spb"></div>
<canvas id="bgCanvas"></canvas>

<div id="underwaterGlow">
  <div class="caustic-line" style="left:20%;--dur:3.8s;--delay:.0s;--r0:-4deg;--r1:3deg;--a0:.7;--a1:.3"></div>
  <div class="caustic-line" style="left:33%;--dur:4.4s;--delay:.6s;--r0:2deg;--r1:-3deg;--a0:.5;--a1:.9"></div>
  <div class="caustic-line" style="left:50%;--dur:5.0s;--delay:.3s;--r0:0deg;--r1:-2deg;--a0:.9;--a1:.5"></div>
  <div class="caustic-line" style="left:65%;--dur:3.6s;--delay:1.8s;--r0:3deg;--r1:-4deg;--a0:.4;--a1:.8"></div>
  <div class="caustic-line" style="left:79%;--dur:4.2s;--delay:.9s;--r0:-3deg;--r1:2deg;--a0:.6;--a1:.3"></div>
</div>

<nav class="navbar" id="navbar">
  <div class="container">
    <div class="nav-brand">
      <div class="nav-logo-wrap">
        <a href="index.html" class="nav-logo" aria-label="TradeConnect">
          <img src="../assets/logo.svg" alt="TradeConnect" width="36" height="36">
        </a>
        <span class="nav-logo-label">TradeConnect</span>
      </div>
    </div>
    <div class="nav-center">
      <a href="index.html">Home</a>
      <a href="explore.html">Explore</a>
    </div>
    <div class="nav-right">
      <a href="login.html" class="nav-btn-ghost">Login</a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-badge"><span class="badge-dot"></span>Free forever</div>
    <h2 class="auth-title">Join TradeConnect</h2>
    <p class="auth-subtitle">Create your account and start trading smarter.</p>
    <div id="message" class="message" style="display:none;"></div>
    <form id="registerForm" class="auth-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Minimum 6 characters" required minlength="6">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="trading_style">Trading Style <span class="optional">Optional</span></label>
          <select id="trading_style" name="trading_style">
            <option value="">Select style</option>
            <option value="day">Day Trading</option>
            <option value="swing">Swing Trading</option>
            <option value="scalping">Scalping</option>
            <option value="position">Position Trading</option>
          </select>
        </div>
        <div class="form-group">
          <label for="experience_level">Experience <span class="optional">Optional</span></label>
          <select id="experience_level" name="experience_level">
            <option value="">Select level</option>
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
            <option value="expert">Expert</option>
          </select>
        </div>
      </div>
      <div class="form-group terms-group">
        <label class="checkbox-label">
          <input type="checkbox" name="terms" required>
          I agree to the <a href="#" class="terms-link">Terms</a> &amp; <a href="#" class="terms-link">Privacy Policy</a>
        </label>
      </div>
      <button type="submit" class="btn-register" id="registerBtn">Create Account</button>
    </form>
    <div class="divider"><span>OR</span></div>
    <button class="btn-google" id="googleRegisterBtn">
      <svg width="18" height="18" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.825.957 4.039l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Sign up with Google
    </button>
    <div class="auth-footer">Already have an account? <a href="login.html">Login</a></div>
  </div>
</div>

<script>
(function(){
  const cv=document.getElementById('bgCanvas'),ctx=cv.getContext('2d');
  let W,H;
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  resize(); window.addEventListener('resize',resize,{passive:true});
  const orbs=[
    {x:.5,y:.85,r:.38,col:'rgba(123,97,255,.15)',spd:.008,phase:0},
    {x:.2,y:.25,r:.22,col:'rgba(94,106,210,.10)',spd:.006,phase:1.5},
    {x:.82,y:.35,r:.18,col:'rgba(123,97,255,.08)',spd:.007,phase:3.2},
  ];
  const pts=Array.from({length:60},()=>({x:Math.random(),y:Math.random(),r:.5+Math.random()*1.2,a:.1+Math.random()*.35,tw:Math.random()*Math.PI*2,ts:.008+Math.random()*.015}));
  (function render(){
    ctx.clearRect(0,0,W,H);
    orbs.forEach(o=>{o.phase+=o.spd;const x=(o.x+Math.sin(o.phase)*.04)*W,y=(o.y+Math.cos(o.phase*.7)*.03)*H;const g=ctx.createRadialGradient(x,y,0,x,y,o.r*W);g.addColorStop(0,o.col);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,o.r*W,0,Math.PI*2);ctx.fill();});
    pts.forEach(p=>{p.tw+=p.ts;ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(200,190,255,${p.a*(.6+.4*Math.sin(p.tw))})`;ctx.fill();});
    requestAnimationFrame(render);
  })();
})();
</script>
<script src="../js/config.js"></script>
<script src="../js/api.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/auth.js"></script>
<script>
const navbar = document.getElementById('navbar');
window.addEventListener('scroll', () => {
  navbar.classList.toggle('scrolled', window.scrollY > 60);
}, { passive: true });
</script>
</body>
</html>
