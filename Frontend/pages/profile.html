<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - TradeConnect</title>
    
    <!-- Load CSS in this ORDER -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-auth">
        <div class="container">
            <div class="nav-brand">
                <a href="feed.html"><h1>📈 TradeConnect</h1></a>
            </div>
            <div class="nav-links">
                <a href="feed.html">Feed</a>
                <a href="explore.html">Explore</a>
                <a href="#" id="profileLink" class="active">Profile</a>
                <button class="btn-secondary" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Profile Header -->
    <div class="profile-header">
        <div class="container">
            <div class="profile-info">
                <img id="profileAvatar" src="https://ui-avatars.com/api/?name=User" alt="Profile" class="profile-avatar-large">
                <div class="profile-details">
                    <h1 id="profileName">Loading...</h1>
                    <p id="profileEmail" class="text-muted"></p>
                    <p id="profileBio"></p>
                    <div class="profile-meta">
                        <span id="tradingStyle" class="badge"></span>
                        <span id="experienceLevel" class="badge"></span>
                        <a id="portfolioLink" href="#" target="_blank" class="link" style="display: none;">Portfolio</a>
                    </div>
                    <div class="profile-stats">
                        <div class="stat">
                            <span class="stat-value" id="postsCount">0</span>
                            <span class="stat-label">Posts</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value" id="followersCount">0</span>
                            <span class="stat-label">Followers</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value" id="followingCount">0</span>
                            <span class="stat-label">Following</span>
                        </div>
                    </div>
                    <div class="profile-actions" id="profileActions">
                        <button class="btn-primary" id="editProfileBtn" style="display: none;">Edit Profile</button>
                        <!-- Follow button will be inserted here if not own profile -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Profile Tabs -->
    <div class="profile-tabs">
        <div class="container">
            <button class="tab-btn active" data-tab="posts">Posts</button>
            <button class="tab-btn" data-tab="followers">Followers</button>
            <button class="tab-btn" data-tab="following">Following</button>
        </div>
    </div>

    <!-- Profile Content -->
    <div class="main-content">
        <div class="container">
            <!-- Posts Tab -->
            <div id="postsTab" class="tab-content active">
                <div id="userPosts" class="posts-container">
                    <!-- User posts will be loaded here -->
                </div>
            </div>

            <!-- Followers Tab -->
            <div id="followersTab" class="tab-content">
                <div id="followersList" class="users-grid">
                    <!-- Followers will be loaded here -->
                </div>
            </div>

            <!-- Following Tab -->
            <div id="followingTab" class="tab-content">
                <div id="followingList" class="users-grid">
                    <!-- Following will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div id="editProfileModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Edit Profile</h3>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <form id="editProfileForm" class="modal-form">
                <div class="form-group">
                    <label for="editName">Name</label>
                    <input type="text" id="editName" name="name" required>
                </div>
                <div class="form-group">
                    <label for="editBio">Bio</label>
                    <textarea id="editBio" name="bio" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label for="editTradingStyle">Trading Style</label>
                    <select id="editTradingStyle" name="trading_style">
                        <option value="">Select your style</option>
                        <option value="day">Day Trading</option>
                        <option value="swing">Swing Trading</option>
                        <option value="scalping">Scalping</option>
                        <option value="position">Position Trading</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editExperienceLevel">Experience Level</label>
                    <select id="editExperienceLevel" name="experience_level">
                        <option value="">Select your level</option>
                        <option value="beginner">Beginner</option>
                        <option value="intermediate">Intermediate</option>
                        <option value="advanced">Advanced</option>
                        <option value="expert">Expert</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editPortfolio">Portfolio Link</label>
                    <input type="url" id="editPortfolio" name="portfolio_link" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label for="editAvatar">Avatar URL</label>
                    <input type="url" id="editAvatar" name="avatar" placeholder="https://...">
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelEditBtn">Cancel</button>
                    <button type="submit" class="btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/profile.js"></script>
</body>
</html>
