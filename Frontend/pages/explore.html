<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore - TradeConnect</title>
    
    <!-- Load CSS in this ORDER -->
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/pages.css">
    <link rel="stylesheet" href="../css/responsive.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-auth">
        <div class="container">
            <div class="nav-brand">
                <a href="feed.html"><h1>📈 TradeConnect</h1></a>
            </div>
            <div class="nav-links">
                <a href="feed.html">Feed</a>
                <a href="explore.html" class="active">Explore</a>
                <a href="#" id="profileLink">Profile</a>
                <button class="btn-secondary" id="logoutBtn">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Explore Header -->
    <div class="explore-header">
        <div class="container">
            <h1>Discover Traders</h1>
            <p>Find and connect with traders from around the world</p>
        </div>
    </div>

    <!-- Search & Filters -->
    <div class="search-section">
        <div class="container">
            <div class="search-container">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search traders by name or email..."
                    class="search-input"
                >
                <button class="btn-primary" id="searchBtn">Search</button>
            </div>

            <div class="filters-container">
                <select id="tradingStyleFilter" class="filter-select">
                    <option value="">All Trading Styles</option>
                    <option value="day">Day Trading</option>
                    <option value="swing">Swing Trading</option>
                    <option value="scalping">Scalping</option>
                    <option value="position">Position Trading</option>
                </select>

                <select id="experienceFilter" class="filter-select">
                    <option value="">All Experience Levels</option>
                    <option value="beginner">Beginner</option>
                    <option value="intermediate">Intermediate</option>
                    <option value="advanced">Advanced</option>
                    <option value="expert">Expert</option>
                </select>

                <button class="btn-secondary" id="resetFiltersBtn">Reset Filters</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container">
            <!-- Loading State -->
            <div id="loadingState" class="loading-state">
                <p>Loading traders...</p>
            </div>

            <!-- Traders Grid -->
            <div id="tradersGrid" class="traders-grid">
                <!-- Trader cards will be loaded here dynamically -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <h3>No traders found</h3>
                <p>Try adjusting your search or filters</p>
            </div>

            <!-- Load More -->
            <div class="load-more" id="loadMoreContainer" style="display: none;">
                <button class="btn-secondary" id="loadMoreBtn">Load More</button>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/explore.js"></script>
</body>
</html>
